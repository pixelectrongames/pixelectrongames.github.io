<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PixElectron Games | Bug Report</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #ffffff;
    --header-bg: #000000;
    --text-main: #333;
    --link-color: #0066cc;
    --container-width: 80%;
    --max-width: 800px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Inter', sans-serif;
    background:var(--bg-color);
    color:var(--text-main);
}

header {
    background:#000;
    color:#fff;
    padding:60px 0;
}

.header-content {
    width:var(--container-width);
    max-width:var(--max-width);
    margin:auto;
}

.logo-img {
    max-width:250px;
    margin-bottom:10px;
}

.container {
    width:var(--container-width);
    max-width:var(--max-width);
    margin:60px auto;
}

h2 {
    font-weight:800;
    margin-bottom:20px;
    text-transform:uppercase;
}

form {
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, select, textarea {
    padding:12px;
    font-size:14px;
    border:1px solid #ccc;
    border-radius:4px;
}

textarea {
    resize:vertical;
    min-height:120px;
}

button {
    background:#000;
    color:#fff;
    border:none;
    padding:14px;
    font-weight:600;
    cursor:pointer;
    transition:0.2s;
}

button:hover {
    background:#0066cc;
}

.preview {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.preview div {
    position:relative;
}

.preview img {
    width:80px;
    border-radius:4px;
}

.remove-btn {
    position:absolute;
    top:0;
    right:5px;
    background:#000;
    color:#fff;
    font-size:12px;
    padding:2px 6px;
    cursor:pointer;
}

small {
    color:#666;
    font-size:12px;
}

.counter {
    text-align:right;
    font-size:12px;
    color:#666;
}

footer {
    border-top:1px solid #eee;
    padding:40px 0;
}

.footer-content {
    width:var(--container-width);
    max-width:var(--max-width);
    margin:auto;
}

.copyright {
    font-size:0.85rem;
    color:#666;
}
</style>
</head>

<body>

<header>
<div class="header-content">
    <img src="PixElectronLogo.png" class="logo-img">
    <p>Bug Report System</p>
</div>
</header>

<div class="container">
<h2>Report a Bug</h2>

<form id="bugForm">

<select id="game" required>
    <option value="">Select Game</option>
    <option value="Dino Eternal">Dino Eternal</option>
</select>

<input type="text" id="playerID" placeholder="Player ID (Optional, max 8 digits)" maxlength="8" inputmode="numeric">

<textarea id="description" placeholder="Describe the bug..." maxlength="300" required></textarea>
<div class="counter" id="counter">0 / 300</div>

<input type="file" id="images" multiple accept="image/*">
<small>Max 3 images</small>

<div class="preview" id="preview"></div>

<button type="submit">Submit Report</button>

</form>
</div>

<footer>
<div class="footer-content">
    <p class="copyright">© 2026 PixElectron Games. All rights reserved.</p>
</div>
</footer>

<script>
const webhook = "WEBHOOK_URL";

const input = document.getElementById("images");
const preview = document.getElementById("preview");
let files = [];

document.getElementById("playerID").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, "").slice(0,8);
});

const desc = document.getElementById("description");
const counter = document.getElementById("counter");

desc.addEventListener("input", () => {
    counter.textContent = desc.value.length + " / 300";
});

input.addEventListener("change", () => {
    files = Array.from(input.files).slice(0,3);
    renderPreview();
});

function renderPreview() {
    preview.innerHTML = "";

    files.forEach((file, index) => {
        const reader = new FileReader();

        reader.onload = e => {
            const wrapper = document.createElement("div");

            const img = document.createElement("img");
            img.src = e.target.result;

            const removeBtn = document.createElement("div");
            removeBtn.className = "remove-btn";
            removeBtn.innerHTML = "✕";

            removeBtn.onclick = () => {
                files.splice(index, 1);
                renderPreview();
            };

            wrapper.appendChild(img);
            wrapper.appendChild(removeBtn);
            preview.appendChild(wrapper);
        };

        reader.readAsDataURL(file);
    });
}

document.getElementById("bugForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const game = document.getElementById("game").value;
    const player = document.getElementById("playerID").value || "Unknown";
    const description = desc.value;

    let content = `Game: ${game}\nPlayer: ${player}\n\n${description}`;

    const formData = new FormData();
    formData.append("content", content);

    files.forEach((file, i) => {
        formData.append(`file${i}`, file);
    });

    await fetch(webhook, {
        method: "POST",
        body: formData
    });

    alert("Bug report sent!");
    document.getElementById("bugForm").reset();
    preview.innerHTML = "";
    files = [];
    counter.textContent = "0 / 300";
});
</script>

</body>
</html>
