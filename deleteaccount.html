<!-- ================= LOGIN PAGE ================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
body {font-family:Inter;background:#0b2a4a;color:#fff;text-align:center;padding:60px;}
button {background:#f4a000;border:none;padding:15px 25px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<h2 id="title"></h2>
<p>Your account and all associated data will be deleted.</p>

<button onclick="login()">SIGN IN WITH GOOGLE SERVICES</button>

<script>
const params = new URLSearchParams(location.search);
const game = params.get('game');
document.getElementById('title').innerText = 'Delete my ' + game + ' account';

function login(){
    // simulate success/fail
    const success = Math.random() > 0.5;
    if(success){
        location.href = 'confirm.html?game=' + game;
    } else {
        location.href = 'error.html';
    }
}
</script>
</body>
</html>
