<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Eternal | Delete Account</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg:#000;
    --text:#fff;
    --card:#111;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);text-align:center}
header{padding:60px 20px}
.logo{max-width:200px;margin-bottom:10px}
.container{max-width:600px;margin:auto;padding:20px}
button{padding:14px 20px;border:none;font-weight:600;cursor:pointer;margin:10px}
#loginBtn{background:#fff;color:#000}
#deleteBtn{background:red;color:#fff}
.hidden{display:none}
small{color:#aaa}
</style>
</head>

<body>

<header>
<img src="your-logo.png" class="logo">
<h1>Dino Eternal</h1>
</header>

<div class="container">
<h2>Delete Account</h2>
<p>This will permanently delete your data.</p>

<button id="loginBtn">Login with Google</button>
<button id="deleteBtn" class="hidden">Delete My Account</button>

<br><br>
<small>Your PlayerID will be removed from database.</small>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4k1p-l3q_oM5ofVhbWiUFKyoqd-yGEiQ",
  authDomain: "dino-eternal-firebase.firebaseapp.com",
  databaseURL: "https://dino-eternal-firebase-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "dino-eternal-firebase",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const loginBtn = document.getElementById("loginBtn");
const deleteBtn = document.getElementById("deleteBtn");

let googleUID = null;
let playerID = null;

loginBtn.onclick = async () => {
    const provider = new GoogleAuthProvider();

    try {
        const result = await signInWithPopup(auth, provider);
        googleUID = result.user.uid;

        // 🔍 Cari PlayerID dari googleindex
        const snapshot = await get(ref(db, "googleindex/" + googleUID));

        if (!snapshot.exists()) {
            alert("Account not found in database");
            return;
        }

        playerID = snapshot.val();

        alert("Login success. PlayerID: " + playerID);
        deleteBtn.classList.remove("hidden");

    } catch (err) {
        alert("Login failed");
    }
};


deleteBtn.onclick = async () => {
    if (!googleUID || !playerID) return;

    const confirmDelete = confirm("Are you sure? This cannot be undone.");
    if (!confirmDelete) return;

    try {
        // 🔥 Hapus data player
        await remove(ref(db, "players/" + playerID));

        // 🔥 Hapus index
        await remove(ref(db, "googleindex/" + googleUID));

        alert("Account deleted successfully");

    } catch (err) {
        alert("Delete failed");
    }
};

</script>

</body>
</html>
